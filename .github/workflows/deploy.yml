name: Deploy Production

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Confirm workflow_run SHA is still current on origin/main
        id: freshness
        env:
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          : "${DEPLOY_SHA:?DEPLOY_SHA is required}"

          git fetch --no-tags origin main
          MAIN_HEAD="$(git rev-parse FETCH_HEAD)"

          if [[ "$DEPLOY_SHA" != "$MAIN_HEAD" ]]; then
            echo "Skipping stale deploy candidate: workflow_run SHA $DEPLOY_SHA is behind current origin/main $MAIN_HEAD" >&2
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        if: ${{ steps.freshness.outputs.proceed == 'true' }}
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${SSH_HOST:?SSH_HOST is required}"
          : "${SSH_USER:?SSH_USER is required}"
          : "${SSH_PRIVATE_KEY:?SSH_PRIVATE_KEY is required}"
          : "${SSH_KNOWN_HOSTS:?SSH_KNOWN_HOSTS is required}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          SSH_PORT="${SSH_PORT:-22}"

          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to production
        if: ${{ steps.freshness.outputs.proceed == 'true' }}
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          : "${SSH_HOST:?SSH_HOST is required}"
          : "${SSH_USER:?SSH_USER is required}"
          : "${DEPLOY_SHA:?DEPLOY_SHA is required}"

          SSH_PORT="${SSH_PORT:-22}"

          ssh \
            -p "$SSH_PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SSH_HOST" \
            "bash -s -- '$DEPLOY_SHA' '/opt/clawith'" < scripts/deploy/deploy_from_github_actions.sh
