{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clawith.secretName" . }}
  labels:
    {{- include "clawith.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret-key: {{ default (randAlphaNum 64) .Values.secrets.secretKey | quote }}
  jwt-secret-key: {{ default (randAlphaNum 64) .Values.secrets.jwtSecretKey | quote }}
{{- end }}
